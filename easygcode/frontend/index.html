<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EasyGcode</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">FullControl core · Friendly workflow</p>
        <h1>Design simple toolpaths and export G-code without writing Python.</h1>
        <p class="hero-copy">Choose a template, tune dimensions, generate G-code, then copy or download the result.</p>
      </section>

      <section class="workspace" aria-label="G-code generator">
        <form id="design-form" class="panel controls">
          <h2>1. Design settings</h2>
          <label>
            Template
            <select name="template" id="template"></select>
          </label>
          <div class="grid-two">
            <label>Width (mm)<input name="width" type="number" value="40" min="1" step="0.1" /></label>
            <label>Depth (mm)<input name="depth" type="number" value="30" min="1" step="0.1" /></label>
            <label>Z height (mm)<input name="height" type="number" value="0.2" min="0" step="0.05" /></label>
            <label>Spacing (mm)<input name="spacing" type="number" value="5" min="0.1" step="0.1" /></label>
            <label>Print feedrate<input name="feedrate" type="number" value="1200" min="60" /></label>
            <label>Travel feedrate<input name="travel_feedrate" type="number" value="6000" min="60" /></label>
          </div>
          <label>Printer profile<input name="printer_name" value="generic" /></label>
          <button type="submit">Generate G-code</button>
          <p id="status" role="status"></p>
        </form>

        <section class="panel output">
          <div class="output-header">
            <div>
              <h2>2. Output</h2>
              <p id="summary">No G-code generated yet.</p>
            </div>
            <button id="download" type="button" disabled>Download</button>
          </div>
          <pre id="gcode" aria-label="Generated G-code"></pre>
        </section>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
